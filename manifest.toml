# FreeSynergy Icons — Manifest
#
# Describes all available icon sets in this repository.
# Each [[set]] entry is read by the IconManager and Gallery program.

[repo]
name    = "FreeSynergy Icons"
version = "1.1.0"

# ── Icon Sets ─────────────────────────────────────────────────────────────────

[[set]]
id               = "freesynergy"
name             = "FreeSynergy Icons"
description      = "Official FreeSynergy brand icons: UI, notifications, system tray, and built-in app icons"
source           = "https://github.com/FreeSynergy/Icons/tree/main/FreeSynergy"
license          = "MIT"
has_dark_variants = false
builtin          = true

[[set]]
id               = "homarrlabs"
name             = "Homarr Labs Dashboard Icons"
description      = "A large collection of SVG icons for self-hosted services and apps"
source           = "https://github.com/homarr-labs/dashboard-icons"
license          = "MIT"
has_dark_variants = true
sync_binary      = "fsn-icons-sync --set homarrlabs"

# ── Cursor Sets ───────────────────────────────────────────────────────────────

[[cursor_set]]
id          = "midnight"
name        = "Midnight Cursors"
description = "Default cursor set for the Midnight Blue theme — monochrome, clean, 32x32"
path        = "cursor-sets/midnight"
builtin     = true

# ──────────────────────────────────────────────────────────────────────────────

[[set]]
id               = "we10x"
name             = "We10X Icon Theme"
description      = "Freedesktop-compliant icon theme with scalable SVGs for apps, places, mimes, and more"
source           = "https://github.com/yeyushengfan258/We10X-icon-theme"
license          = "GPL-3.0"
has_dark_variants = false
sync_binary      = "fsn-icons-sync --set we10x"
