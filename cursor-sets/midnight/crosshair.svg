<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- white outline -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="16" y1="2"  x2="16" y2="12"/>
    <line x1="16" y1="20" x2="16" y2="30"/>
    <line x1="2"  y1="16" x2="12" y2="16"/>
    <line x1="20" y1="16" x2="30" y2="16"/>
    <circle cx="16" cy="16" r="4"/>
  </g>
  <!-- black crosshair -->
  <g stroke="black" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="16" y1="2"  x2="16" y2="12"/>
    <line x1="16" y1="20" x2="16" y2="30"/>
    <line x1="2"  y1="16" x2="12" y2="16"/>
    <line x1="20" y1="16" x2="30" y2="16"/>
    <circle cx="16" cy="16" r="4"/>
  </g>
</svg>
