<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- white outline — horizontal I-beam -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="6" y1="10" x2="6" y2="22"/>
    <line x1="6" y1="16" x2="26" y2="16"/>
    <line x1="26" y1="10" x2="26" y2="22"/>
  </g>
  <!-- black shape -->
  <g stroke="black" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="6" y1="10" x2="6" y2="22"/>
    <line x1="6" y1="16" x2="26" y2="16"/>
    <line x1="26" y1="10" x2="26" y2="22"/>
  </g>
</svg>
