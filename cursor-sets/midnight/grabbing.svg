<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- white shadow — closed fist (knuckles + palm) -->
  <g fill="white" stroke="white" stroke-width="2" stroke-linejoin="round">
    <rect x="3"  y="12" width="6"  height="8" rx="3"/>
    <rect x="9"  y="10" width="7"  height="10" rx="3"/>
    <rect x="16" y="10" width="7"  height="10" rx="3"/>
    <rect x="23" y="12" width="6"  height="8" rx="3"/>
    <rect x="3"  y="18" width="26" height="10" rx="4"/>
  </g>
  <!-- black fist -->
  <rect x="3"  y="12" width="6"  height="8"  rx="3" fill="black"/>
  <rect x="9"  y="10" width="7"  height="10" rx="3" fill="black"/>
  <rect x="16" y="10" width="7"  height="10" rx="3" fill="black"/>
  <rect x="23" y="12" width="6"  height="8"  rx="3" fill="black"/>
  <rect x="3"  y="18" width="26" height="10" rx="4" fill="black"/>
</svg>
