<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- white outline — crosshair with end stops (cell selection) -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="square" fill="none">
    <line x1="16" y1="2"  x2="16" y2="30"/>
    <line x1="2"  y1="16" x2="30" y2="16"/>
    <line x1="11" y1="2"  x2="21" y2="2"/>
    <line x1="11" y1="30" x2="21" y2="30"/>
    <line x1="2"  y1="11" x2="2"  y2="21"/>
    <line x1="30" y1="11" x2="30" y2="21"/>
  </g>
  <!-- black shape -->
  <g stroke="black" stroke-width="2" stroke-linecap="square" fill="none">
    <line x1="16" y1="2"  x2="16" y2="30"/>
    <line x1="2"  y1="16" x2="30" y2="16"/>
    <line x1="11" y1="2"  x2="21" y2="2"/>
    <line x1="11" y1="30" x2="21" y2="30"/>
    <line x1="2"  y1="11" x2="2"  y2="21"/>
    <line x1="30" y1="11" x2="30" y2="21"/>
  </g>
</svg>
