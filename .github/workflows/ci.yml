name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  svg-security:
    name: SVG security check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan SVG files for dangerous JavaScript
        run: |
          DANGEROUS=$(grep -rl \
            -e 'XMLHttpRequest' \
            -e 'fetch(' \
            -e 'eval(' \
            -e 'document\.write' \
            -e 'window\.location' \
            -e 'localStorage' \
            -e 'sessionStorage' \
            -e 'indexedDB' \
            -e 'navigator\.' \
            -e 'WebSocket' \
            -e 'import(' \
            --include="*.svg" . 2>/dev/null || true)
          if [ -n "$DANGEROUS" ]; then
            echo "ERROR: SVG files contain dangerous JavaScript:"
            echo "$DANGEROUS"
            exit 1
          fi
          echo "SVG security check passed."

  check:
    name: Format + Clippy + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (OOP lints)
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::large_enum_variant \
            -D clippy::cognitive_complexity \
            -D clippy::too_many_arguments \
            -D clippy::too_many_lines \
            -D clippy::wildcard_imports \
            -D clippy::unused_self

      - name: Tests
        run: cargo test --workspace

  deny:
    name: Dependency licenses + advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
